name: CI Pipeline

on:
  push:
  pull_request:
    branches: [ master ]

jobs:
  backend-tests:
    name: Backend Tests (Go)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl

      - name: Create Dummy Frontend Dists
        run: |
          mkdir -p frontend/dist
          touch frontend/dist/index.html
          mkdir -p cmd/room-config/frontend/dist
          touch cmd/room-config/frontend/dist/index.html

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Run Go Tests
        run: |
          # Run tests, stream to console, and save logs
          set -o pipefail
          EXIT_CODE=0
          go test -v ./... | tee go-test.log || EXIT_CODE=$?
          
          # Disable exit-on-error and pipefail so grep mismatch doesn't abort script
          set +e
          set +o pipefail
          
          # Parse results
          PASSED_PKGS=$(grep -E '^ok[[:space:]]+' go-test.log | wc -l)
          FAILED_PKGS=$(grep -E '^FAIL[[:space:]]+' go-test.log | wc -l)
          TOTAL_PKGS=$((PASSED_PKGS + FAILED_PKGS))
          
          # Write Markdown summary
          echo "### Go Test Report 🧪" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### Summary" >> $GITHUB_STEP_SUMMARY
          if [ "$FAILED_PKGS" -eq 0 ]; then
            echo "- **Packages**: ✅ $PASSED_PKGS passed · $TOTAL_PKGS total" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Packages**: ❌ $PASSED_PKGS passed, $FAILED_PKGS failed · $TOTAL_PKGS total" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Collapsible detailed logs
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "<details><summary>View Full Go Test Logs</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`text" >> $GITHUB_STEP_SUMMARY
          cat go-test.log >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY
          
          exit $EXIT_CODE

  frontend-tests:
    name: Frontend Tests (React)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Run Frontend Tests
        working-directory: frontend
        run: npm run test -- --run
